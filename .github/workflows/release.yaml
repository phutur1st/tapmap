name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller spec
        run: |
          python -m PyInstaller --noconfirm --clean tapmap.spec

      # Copy assets you still need next to the built app/bundle.
      # Assumes you keep these in repo at: assets/styles.css and assets/keys.js
      - name: Copy required assets into dist
        run: |
          python - << 'PY'
          from pathlib import Path
          import shutil

          src_assets_dir = Path("assets")
          dist_dir = Path("dist") / "tapmap"
          dist_dir.mkdir(parents=True, exist_ok=True)

          wanted = [
              ("styles.css", src_assets_dir / "styles.css"),
              ("keys.js", src_assets_dir / "keys.js"),
          ]

          copied = []
          for name, src in wanted:
              if src.exists():
                  dst = dist_dir / name
                  shutil.copy2(src, dst)
                  copied.append(str(dst))
              else:
                  print(f"NOTE: Missing asset in repo: {src}")

          print("Copied:", copied)
          PY
        shell: bash

      # macOS: build a .pkg installer (unsigned by default)
      - name: Build macOS pkg
        if: runner.os == 'macOS'
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Package the entire dist/tapmap directory to /Applications/TapMap
          pkgbuild \
            --root "dist/tapmap" \
            --install-location "/Applications/TapMap" \
            "tapmap-component.pkg"

          # If you do not sign, omit --sign (productbuild will create an unsigned pkg)
          productbuild \
            --package "tapmap-component.pkg" \
            "tapmap-${TAG}-macos.pkg"

          rm -f "tapmap-component.pkg"

      # Optional: Sign pkg (requires Apple Developer Program + Developer ID Installer cert)
      - name: Sign macOS pkg (optional)
        if: runner.os == 'macOS' && env.MACOS_INSTALLER_IDENTITY != '' && secrets.MACOS_CERT_P12 != '' && secrets.MACOS_CERT_PASSWORD != ''
        env:
          MACOS_INSTALLER_IDENTITY: ${{ secrets.MACOS_INSTALLER_IDENTITY }} # e.g. "Developer ID Installer: Your Name (TEAMID)"
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}                     # base64 of .p12
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}           # password for .p12
        run: |
          TAG="${GITHUB_REF_NAME}"

          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/productbuild -T /usr/bin/pkgbuild -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          # Rebuild signed pkg
          pkgbuild \
            --root "dist/tapmap" \
            --install-location "/Applications/TapMap" \
            "tapmap-component.pkg"

          productbuild \
            --sign "$MACOS_INSTALLER_IDENTITY" \
            --timestamp \
            --package "tapmap-component.pkg" \
            "tapmap-${TAG}-macos.pkg"

          rm -f cert.p12 "tapmap-component.pkg"

      # Optional: Notarize pkg (recommended for smooth Gatekeeper experience)
      # Requires Apple ID + Team ID + app-specific password (or App Store Connect API key)
      - name: Notarize macOS pkg (optional)
        if: runner.os == 'macOS' && secrets.MACOS_NOTARY_APPLE_ID != '' && secrets.MACOS_NOTARY_TEAM_ID != '' && secrets.MACOS_NOTARY_PASSWORD != ''
        env:
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          xcrun notarytool submit "tapmap-${TAG}-macos.pkg" \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --password "$MACOS_NOTARY_PASSWORD" \
            --wait

          # Staple ticket to the pkg
          xcrun stapler staple "tapmap-${TAG}-macos.pkg"

      # Windows/Linux: zip as before
      - name: Create release zip (Windows/Linux)
        if: runner.os != 'macOS'
        run: |
          python - << 'PY'
          import os
          import zipfile
          from pathlib import Path

          os_name = os.environ["RUNNER_OS"].lower()
          tag = os.environ["GITHUB_REF_NAME"]

          src_dir = Path("dist") / "tapmap"
          zip_name = f"tapmap-{tag}-{os_name}.zip"
          zip_path = Path(zip_name)

          def add_dir(zf: zipfile.ZipFile, folder: Path):
              for p in folder.rglob("*"):
                  if p.is_file():
                      zf.write(p, p.relative_to(folder))

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              add_dir(zf, src_dir)

          print(zip_name)
          PY
        shell: bash

      # Checksums
      - name: Create SHA256 (macOS pkg)
        if: runner.os == 'macOS'
        run: |
          FILE="tapmap-${GITHUB_REF_NAME}-macos.pkg"
          shasum -a 256 "$FILE" > "$FILE.sha256"

      - name: Create SHA256 (Linux)
        if: runner.os == 'Linux'
        run: |
          FILE="tapmap-${GITHUB_REF_NAME}-linux.zip"
          shasum -a 256 "$FILE" > "$FILE.sha256"

      - name: Create SHA256 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $file = "tapmap-$($env:GITHUB_REF_NAME)-windows.zip"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
          "$hash  $file" | Out-File -Encoding ascii "$file.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tapmap-${{ github.ref_name }}-windows.zip
            tapmap-${{ github.ref_name }}-windows.zip.sha256
            tapmap-${{ github.ref_name }}-linux.zip
            tapmap-${{ github.ref_name }}-linux.zip.sha256
            tapmap-${{ github.ref_name }}-macos.pkg
            tapmap-${{ github.ref_name }}-macos.pkg.sha256