name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller spec
        run: |
          python -m PyInstaller --noconfirm --clean tapmap.spec

      - name: Ensure external data folder next to app
        run: |
          python - << 'PY'
          from pathlib import Path

          app_dir = Path("dist") / "tapmap"
          data_dir = app_dir / "data"
          data_dir.mkdir(parents=True, exist_ok=True)

          readme = data_dir / "README.txt"
          if not readme.exists():
              readme.write_text(
                  "Place GeoIP .mmdb databases here.\n"
                  "Required files:\n"
                  "- GeoLite2-ASN.mmdb\n"
                  "- GeoLite2-City.mmdb\n",
                  encoding="utf-8",
              )

          print(f"OK: {data_dir}")
          PY
        shell: bash

      - name: Create release zip
        run: |
          python - << 'PY'
          import os
          import zipfile
          from pathlib import Path

          os_name = os.environ["RUNNER_OS"].lower()
          tag = os.environ["GITHUB_REF_NAME"]

          src_dir = Path("dist") / "tapmap"
          zip_name = f"tapmap-{tag}-{os_name}.zip"
          zip_path = Path(zip_name)

          def add_dir(zf: zipfile.ZipFile, folder: Path):
              for p in folder.rglob("*"):
                  if p.is_file():
                      zf.write(p, p.relative_to(folder))

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              add_dir(zf, src_dir)

          print(zip_name)
          PY
        shell: bash

      - name: Create SHA256
        if: runner.os != 'Windows'
        run: |
          OS_NAME=$(echo "${RUNNER_OS}" | tr '[:upper:]' '[:lower:]')
          FILE="tapmap-${GITHUB_REF_NAME}-${OS_NAME}.zip"
          shasum -a 256 "$FILE" > "$FILE.sha256"

      - name: Create SHA256 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $os = $env:RUNNER_OS.ToLower()
          $file = "tapmap-$($env:GITHUB_REF_NAME)-$os.zip"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
          "$hash  $file" | Out-File -Encoding ascii "$file.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tapmap-${{ github.ref_name }}-*.zip
            tapmap-${{ github.ref_name }}-*.zip.sha256
