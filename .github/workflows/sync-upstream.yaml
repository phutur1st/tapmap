name: Sync with upstream

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync main with olalie/tapmap
    runs-on: ubuntu-latest

    steps:
      - name: Sync fork via GitHub API
        run: |
          response=$(gh api repos/phutur1st/tapmap/merge-upstream \
            -f branch=main \
            --jq '.message')
          echo "Sync result: $response"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
