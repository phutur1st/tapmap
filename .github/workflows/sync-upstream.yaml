name: Sync with upstream

on:
  workflow_dispatch:  # manual only — auto-sync disabled (fork is diverged)

permissions:
  contents: write

jobs:
  sync:
    name: Sync main with olalie/tapmap
    runs-on: ubuntu-latest

    steps:
      - name: Sync fork via GitHub API
        run: |
          response=$(gh api repos/phutur1st/tapmap/merge-upstream \
            -f branch=main \
            --jq '.message')
          echo "Sync result: $response"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
